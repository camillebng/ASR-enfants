<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Outil de transcription automatique</title>
        <link rel="stylesheet" href="/static/styles.css">
    </head>
    <body>
        <main class="app-layout">
            <div class="left-panels">
                <section class="parameters-panel">
                    <h2>Paramètres</h2>
                    
                    <div class="parameters-grid">
                        
                        <div class="form-group">
                            <label for="model-type">Système</label>
                            <select name="model-type" id="model-type">
                                <option value="whisperx">WhisperX</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="model-size">Taille du modèle</label>
                            <select name="model-size" id="model-size">
                                <option value="tiny">Tiny</option>
                                <option value="base">Base</option>
                                <option value="small">Small</option>
                                <option value="medium">Medium</option>
                                <option value="large">Large</option>
                                <option value="turbo">Turbo</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="lang">Langue</label>
                            <select name="lang" id="lang">
                                <option value="fr">Français</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="device-type">Matériel</label>
                            <select name="device-type" id="device-type">
                                <option value="cpu">Processeur (CPU)</option>
                                <option value="cuda">Carte graphique NVIDIA</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="compute-type">Type de calcul</label>
                            <select name="compute-type" id="compute-type">
                                <option value="float16">float16</option>
                                <option value="float32">float32</option>
                                <option value="int8">int8</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="batch-size">Taille du lot</label>
                            <select name="batch-size" id="batch-size">
                                <option value="16">16</option>
                                <option value="8">8</option>
                                <option value="4">4</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="temperature">Température</label>
                            <input type="number" id="temperature" min="0" max="1" value="0.0" step="0.1">
                        </div>

                        <div class="form-group">
                            <label for="compression">Taux de seuil de compression</label>
                            <input type="number" id="compression" min="1.5" max="5" value="3.5" step="0.1">
                        </div>

                        <div class="form-group">
                            <label for="beam-size">Largeur du faisceau</label>
                            <input type="number" id="beam-size" min="1" max="10" value="5" step="1">
                        </div>

                    </div>
                    <div class="exec-button">
                        <button type="button" id="transcr-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pen-line-icon lucide-pen-line">
                                <path d="M13 21h8"/>
                                <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
                            </svg>
                            Transcrire
                        </button>
                        <button type="button" id="interrupt-btn" title="Interrompre l'exécution">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-stop-icon lucide-circle-stop">
                                <circle cx="12" cy="12" r="10"/>
                                <rect x="9" y="9" width="6" height="6" rx="1"/>
                            </svg>
                        </button>    
                    </div>
                </section>
                <section class="execution-window">
                    <h2> Fenêtre d'exécution</h2>
                    <div class="execution-div">
                            <textarea id="execution-console" readonly>$ python mon_script.py&#10;</textarea>
                    </div>
                </section>
            </div>
            <div class="right-panels">
                <section class="files-panel">
                    <h2>Fichiers</h2>
                    <label for="transcr-ref">Choisir une transcription de référence (facultatif)</label>
                    <input type="file" id="transcr-ref" accept=".txt"/>
                    <label for="sounds">Choisir les fichiers sons à transcrire</label>
                    <input type="file" id="sounds" accept=".wav" multiple/> 

                    <button id="clear-btn" class="hidden" type="button" >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x">
                                <path d="M18 6 6 18"/>
                                <path d="m6 6 12 12"/>
                            </svg>
                            Supprimer les fichiers
                    </button>    
                    <ul id="file-list-display"></ul> 

                    <div id="praat-scripts" class="hidden">
                        Souhaitez-vous scinder votre fichier son ? (Conseillé pour les enregistrements de +10-15min)
                        <button id="split-btn" type="button">

                        </button>
                    </div>
                    
                </section>
                <section class="results-panel">
                    <div class="tabs-container">
                        <input type="radio" id="tab-transcript" name="results-tabs" checked>
                        <input type="radio" id="tab-wer" name="results-tabs">

                        <div class="tab-headers">
                            <label for="tab-transcript" class="tablinks">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text-icon lucide-file-text">
                                    <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/>
                                    <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
                                    <path d="M10 9H8"/>
                                    <path d="M16 13H8"/>
                                    <path d="M16 17H8"/>
                                </svg>
                                Transcription
                            </label>
                            <label for="tab-wer" class="tablinks">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chart-column-icon lucide-chart-column">
                                    <path d="M3 3v16a2 2 0 0 0 2 2h16"/>
                                    <path d="M18 17V9"/>
                                    <path d="M13 17V5"/>
                                    <path d="M8 17v-3"/>
                                </svg>
                                WER/CER
                            </label>
                            
                        </div>
                        <div class="tabcontent" id="content-transcript" style="margin-top: 15px;">                           
                            <label for="export-format">Format d'export :</label>
                            <select id="export-format" style="margin-right: 10px; padding: 5px;">
                                <option value="txt">Texte brut (.txt)</option>
                            </select>

                            <button id="download-btn" class="results-btns" style="padding: 5px 15px;">Exporter</button>

                            <p id="transcript-text">La transcription apparaîtra ici</p>                          
                        </div>
                        <div class="tabcontent" id="content-wer">
                            <div>
                                Quels codages sont à éliminer du calcul ? <br>
                                <input type="text" id="codage" placeholder="ex. xxx prenom lieu"/> <br>
                                <button id="wer-btn" class="results-btns">Calculer le WER/CER</button>
                                <div id="wer-results"></div>
                            </div>    
                        </div>
                    </div>
                </section>
            </div>
            
        </main>

        <footer>

        </footer>
        <script src="/static/FormData.js"></script>
    </body>
</html>
